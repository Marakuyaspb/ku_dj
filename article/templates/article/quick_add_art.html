{% extends 'main/just_page.html' %}


{% block content %}

	<div class='big_fields_text my-5'>
		<h2 class='py-3'>Быстрое добавление статьи</h2>
		<form method="post">
			{% csrf_token %}

			{{ form.article_title }}
			{{ form.article_category }}
			{{ form.article_annotation }}
			{{ form.article_body }}

			<button class="btn btn-warning" type="submit">Добавить стаью</button>
		</form>
	</div>

{% endblock %}
